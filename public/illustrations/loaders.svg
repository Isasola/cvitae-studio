<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" fill="#F5F0E8"/>

  <!-- === HOURGLASS (center, slightly tilted) === -->
  <g transform="rotate(-5, 200, 150)">
    <!-- Shadow -->
    <g transform="translate(5,5)" opacity="0.3">
      <rect x="148" y="18" width="104" height="18" fill="#111111"/>
      <rect x="148" y="262" width="104" height="18" fill="#111111"/>
      <path d="M148 36 L200 148 L252 36 Z" fill="#111111"/>
      <path d="M148 262 L200 150 L252 262 Z" fill="#111111"/>
    </g>
    <!-- Top cap -->
    <rect x="148" y="18" width="104" height="18" fill="#111111"/>
    <!-- Bottom cap -->
    <rect x="148" y="262" width="104" height="18" fill="#111111"/>

    <!-- Top hourglass half -->
    <path d="M148 36 L200 148 L252 36 Z" fill="#F5F0E8" stroke="#111111" stroke-width="3" stroke-linejoin="miter"/>
    <!-- Sand in top (settling wedge) -->
    <path d="M158 36 L200 136 L242 36 Z" fill="#C9A84C" opacity="0.8"/>
    <!-- Sand surface shimmer -->
    <path d="M162 36 L200 130" stroke="#F5F0E8" stroke-width="1" opacity="0.4"/>
    <path d="M238 36 L200 130" stroke="#F5F0E8" stroke-width="1" opacity="0.4"/>

    <!-- Bottom hourglass half -->
    <path d="M148 262 L200 150 L252 262 Z" fill="#F5F0E8" stroke="#111111" stroke-width="3" stroke-linejoin="miter"/>
    <!-- Sand accumulating at bottom -->
    <path d="M168 262 L200 198 L232 262 Z" fill="#C9A84C" opacity="0.5"/>

    <!-- Waist joint -->
    <rect x="191" y="143" width="18" height="14" fill="#111111"/>
    <!-- Waist highlight -->
    <rect x="193" y="144" width="6" height="12" fill="#C9A84C" opacity="0.5"/>
  </g>

  <!-- === FALLING GRAIN TRANSFORMATION SEQUENCE === -->
  <!-- Stage 1: Sand grain (tiny square) -->
  <rect x="196" y="172" width="8" height="8" fill="#C9A84C" stroke="#111111" stroke-width="1.5"/>

  <!-- Stage 2: Diamond proto-star -->
  <path d="M200 188 L204 196 L200 204 L196 196 Z" fill="#C9A84C" stroke="#111111" stroke-width="1.5"/>

  <!-- Stage 3: 4-point star -->
  <path d="M200 214 L204 222 L212 218 L208 226 L212 234 L204 230 L200 238 L196 230 L188 234 L192 226 L188 218 L196 222 Z" fill="#C9A84C" stroke="#111111" stroke-width="1.5"/>

  <!-- Stage 4: Full 6-point star burst -->
  <path d="M200 248 L203 257 L212 254 L206 261 L212 268 L203 265 L200 274 L197 265 L188 268 L194 261 L188 254 L197 257 Z" fill="#C9A84C" stroke="#111111" stroke-width="2"/>

  <!-- Transformation arrows between stages -->
  <path d="M204 182 L204 186" stroke="#111111" stroke-width="2" stroke-linecap="square"/>
  <path d="M204 205 L204 212" stroke="#111111" stroke-width="2" stroke-linecap="square"/>
  <path d="M204 240 L204 246" stroke="#111111" stroke-width="2" stroke-linecap="square"/>

  <!-- === SPARKLE ACCENTS (left and right) === -->
  <!-- Left sparkles -->
  <path d="M100 140 L100 156 M92 148 L108 148" stroke="#C9A84C" stroke-width="3" stroke-linecap="square"/>
  <path d="M86 186 L86 198 M80 192 L92 192" stroke="#C9A84C" stroke-width="2.5" stroke-linecap="square"/>
  <path d="M116 220 L116 228 M112 224 L120 224" stroke="#C9A84C" stroke-width="2" stroke-linecap="square"/>

  <!-- Right sparkles -->
  <path d="M298 152 L298 168 M290 160 L306 160" stroke="#C9A84C" stroke-width="3" stroke-linecap="square"/>
  <path d="M318 192 L318 204 M312 198 L324 198" stroke="#C9A84C" stroke-width="2.5" stroke-linecap="square"/>
  <path d="M280 230 L280 240 M275 235 L285 235" stroke="#C9A84C" stroke-width="2" stroke-linecap="square"/>

  <!-- === BOTTOM LABEL === -->
  <rect x="0" y="268" width="400" height="32" fill="#111111"/>
  <rect x="12" y="274" width="186" height="20" fill="#C9A84C"/>
  <text x="16" y="288" font-family="'Space Grotesk',Arial,sans-serif" font-size="12" font-weight="900" fill="#111111">LA ESPERA ES PARTE DEL DISEÑO</text>
  <text x="206" y="288" font-family="'Space Grotesk',Arial,sans-serif" font-size="11" font-weight="600" fill="#F5F0E8">loaders · micro-UI · UX</text>
</svg>
