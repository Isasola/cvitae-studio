<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" fill="#F5F0E8"/>

  <!-- === LEFT: CHAOS INPUT === -->
  <!-- Vertical pipe -->
  <rect x="30" y="0" width="36" height="120" fill="#111111"/>
  <rect x="22" y="0" width="52" height="14" fill="#111111"/>
  <!-- Pipe rivets -->
  <rect x="26" y="22" width="8" height="8" fill="#C9A84C" stroke="#111111" stroke-width="1.5"/>
  <rect x="50" y="22" width="8" height="8" fill="#C9A84C" stroke="#111111" stroke-width="1.5"/>
  <rect x="26" y="44" width="8" height="8" fill="#C9A84C" stroke="#111111" stroke-width="1.5"/>
  <rect x="50" y="44" width="8" height="8" fill="#C9A84C" stroke="#111111" stroke-width="1.5"/>

  <!-- Falling document 1 (crumpled look) -->
  <path d="M36 128 L60 128 L64 132 L64 154 L56 158 L32 158 L28 152 L28 132 Z" fill="#F5F0E8" stroke="#111111" stroke-width="2.5" transform="rotate(-8,46,143)"/>
  <path d="M34 136 L56 136" stroke="#111111" stroke-width="1.5" transform="rotate(-8,46,143)"/>
  <path d="M34 142 L50 142" stroke="#111111" stroke-width="1" transform="rotate(-8,46,143)"/>

  <!-- Falling doc 2 -->
  <path d="M34 168 L58 168 L62 172 L62 192 L54 196 L30 196 L26 190 L26 172 Z" fill="#F5F0E8" stroke="#111111" stroke-width="2.5" transform="rotate(10,44,182)"/>
  <path d="M32 176 L54 176" stroke="#111111" stroke-width="1.5" transform="rotate(10,44,182)"/>
  <path d="M32 182 L48 182" stroke="#111111" stroke-width="1" transform="rotate(10,44,182)"/>

  <!-- Broken table icon -->
  <path d="M22 210 L72 210" stroke="#111111" stroke-width="3" stroke-linecap="square"/>
  <path d="M28 210 L24 228" stroke="#111111" stroke-width="3" stroke-linecap="square" transform="rotate(8,26,219)"/>
  <path d="M66 210 L70 228" stroke="#111111" stroke-width="3" stroke-linecap="square" transform="rotate(-12,68,219)"/>
  <!-- Crack on table -->
  <path d="M44 208 L40 216 L48 220 L44 228" stroke="#C9A84C" stroke-width="2" fill="none"/>

  <!-- Connector pipe left→machine -->
  <path d="M68 196 L130 196 L130 210" stroke="#111111" stroke-width="14" stroke-linecap="square" fill="none"/>

  <!-- === CENTER: MACHINE === -->
  <!-- Machine shadow -->
  <rect x="134" y="124" width="152" height="120" fill="#111111" transform="translate(5,5)"/>
  <!-- Machine body -->
  <rect x="134" y="124" width="152" height="120" fill="#111111" stroke="#111111" stroke-width="3"/>
  <rect x="142" y="132" width="136" height="104" fill="#F5F0E8" stroke="#111111" stroke-width="2"/>

  <!-- Knob row -->
  <circle cx="162" cy="150" r="10" fill="#C9A84C" stroke="#111111" stroke-width="2"/>
  <circle cx="162" cy="150" r="4" fill="#111111"/>
  <circle cx="186" cy="150" r="10" fill="#C9A84C" stroke="#111111" stroke-width="2"/>
  <circle cx="186" cy="150" r="4" fill="#111111"/>
  <circle cx="210" cy="150" r="10" fill="#C9A84C" stroke="#111111" stroke-width="2"/>
  <circle cx="210" cy="150" r="4" fill="#111111"/>

  <!-- Processing progress bar -->
  <rect x="148" y="170" width="122" height="12" fill="#111111"/>
  <rect x="148" y="170" width="86" height="12" fill="#C9A84C"/>
  <!-- Blinking indicator -->
  <rect x="256" y="170" width="14" height="12" fill="#C9A84C" opacity="0.6"/>

  <!-- Screen on machine face -->
  <rect x="148" y="192" width="122" height="26" fill="#111111"/>
  <text x="154" y="209" font-family="'Space Grotesk',Arial,sans-serif" font-size="10" font-weight="700" fill="#C9A84C">PROCESANDO DATOS...</text>

  <!-- Vent slits -->
  <rect x="150" y="226" width="118" height="3" fill="#111111" opacity="0.3"/>
  <rect x="150" y="232" width="118" height="3" fill="#111111" opacity="0.3"/>

  <!-- Connector pipe machine→screen -->
  <path d="M286 196 L324 196" stroke="#111111" stroke-width="14" stroke-linecap="square" fill="none"/>

  <!-- === RIGHT: CLEAN OUTPUT SCREEN === -->
  <!-- Screen shadow -->
  <rect x="326" y="54" width="60" height="184" fill="#111111" transform="translate(5,5)"/>
  <!-- Screen body -->
  <rect x="326" y="54" width="60" height="184" fill="#F5F0E8" stroke="#111111" stroke-width="3"/>
  <!-- Screen bezel top -->
  <rect x="326" y="54" width="60" height="22" fill="#111111"/>
  <!-- Screen header gold accent -->
  <rect x="332" y="60" width="36" height="10" fill="#C9A84C"/>

  <!-- Bar chart (gold bars rising) -->
  <rect x="334" y="196" width="10" height="28" fill="#C9A84C" stroke="#111111" stroke-width="2"/>
  <rect x="348" y="180" width="10" height="44" fill="#C9A84C" stroke="#111111" stroke-width="2"/>
  <rect x="362" y="162" width="10" height="62" fill="#C9A84C" stroke="#111111" stroke-width="2"/>
  <!-- Trend arrow -->
  <path d="M334 194 L372 162" stroke="#111111" stroke-width="2" stroke-dasharray="3,2" fill="none"/>
  <polygon points="372,162 364,164 370,170" fill="#111111"/>
  <!-- Chart baseline -->
  <path d="M332 226 L378 226" stroke="#111111" stroke-width="2"/>

  <!-- Mini metrics on screen -->
  <rect x="332" y="84" width="48" height="14" fill="#111111"/>
  <rect x="332" y="84" width="32" height="14" fill="#C9A84C"/>
  <rect x="332" y="102" width="48" height="14" fill="#111111"/>
  <rect x="332" y="102" width="40" height="14" fill="#C9A84C"/>
  <rect x="332" y="120" width="48" height="14" fill="#111111"/>
  <rect x="332" y="120" width="22" height="14" fill="#C9A84C"/>

  <!-- Screen stand -->
  <rect x="348" y="238" width="16" height="14" fill="#111111"/>
  <rect x="334" y="250" width="44" height="8" fill="#111111"/>
</svg>
