<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280" fill="none">
  <rect width="400" height="280" fill="#F5F0E8"/>
  <!-- Input pipe (left) -->
  <rect x="28" y="16" width="44" height="130" fill="#111111"/>
  <!-- Pipe top cap -->
  <rect x="18" y="16" width="64" height="14" fill="#111111"/>
  <!-- Falling papers (chaotic) -->
  <rect x="32" y="152" width="30" height="22" fill="#F5F0E8" stroke="#111111" stroke-width="2" transform="rotate(-12,47,163)"/>
  <rect x="30" y="178" width="24" height="18" fill="#F5F0E8" stroke="#111111" stroke-width="2" transform="rotate(9,42,187)"/>
  <rect x="34" y="204" width="28" height="18" fill="#F5F0E8" stroke="#111111" stroke-width="2" transform="rotate(-6,48,213)"/>
  <!-- Lines on papers (data scribbles) -->
  <line x1="35" y1="154" x2="55" y2="154" stroke="#111111" stroke-width="1" transform="rotate(-12,47,163)"/>
  <line x1="35" y1="158" x2="50" y2="158" stroke="#111111" stroke-width="1" transform="rotate(-12,47,163)"/>
  <line x1="35" y1="162" x2="55" y2="162" stroke="#111111" stroke-width="1" transform="rotate(-12,47,163)"/>
  <!-- Broken table symbol -->
  <rect x="26" y="168" width="44" height="4" fill="#111111" transform="rotate(6,48,170)"/>
  <rect x="28" y="172" width="4" height="14" fill="#111111" transform="rotate(6,30,179)"/>
  <rect x="62" y="170" width="4" height="14" fill="#111111" transform="rotate(-9,64,177)"/>
  <!-- Connector pipe to machine -->
  <rect x="72" y="178" width="58" height="22" fill="#111111"/>
  <!-- Machine / processor -->
  <rect x="128" y="128" width="162" height="108" fill="#111111"/>
  <rect x="136" y="136" width="146" height="92" fill="#F5F0E8" stroke="#111111" stroke-width="2"/>
  <!-- Machine knobs row -->
  <rect x="141" y="141" width="16" height="16" fill="#C9A84C" stroke="#111111" stroke-width="2"/>
  <rect x="163" y="141" width="16" height="16" fill="#C9A84C" stroke="#111111" stroke-width="2"/>
  <rect x="185" y="141" width="16" height="16" fill="#C9A84C" stroke="#111111" stroke-width="2"/>
  <!-- Progress bar -->
  <rect x="141" y="168" width="130" height="12" fill="#111111"/>
  <rect x="141" y="168" width="88" height="12" fill="#C9A84C"/>
  <!-- Machine label -->
  <text x="154" y="202" font-family="Arial, sans-serif" font-size="10" font-weight="900" fill="#111111">PROCESANDO...</text>
  <!-- Connector pipe to screen -->
  <rect x="290" y="176" width="18" height="24" fill="#111111"/>
  <!-- Output screen (right) -->
  <rect x="306" y="72" width="78" height="136" fill="#F5F0E8" stroke="#111111" stroke-width="3"/>
  <!-- Screen top bar -->
  <rect x="306" y="72" width="78" height="22" fill="#111111"/>
  <!-- Screen header gold bar -->
  <rect x="312" y="78" width="48" height="10" fill="#C9A84C"/>
  <!-- Gold bar charts -->
  <rect x="314" y="178" width="12" height="22" fill="#C9A84C" stroke="#111111" stroke-width="2"/>
  <rect x="330" y="162" width="12" height="38" fill="#C9A84C" stroke="#111111" stroke-width="2"/>
  <rect x="346" y="148" width="12" height="52" fill="#C9A84C" stroke="#111111" stroke-width="2"/>
  <rect x="362" y="138" width="12" height="62" fill="#C9A84C" stroke="#111111" stroke-width="2"/>
  <!-- Chart baseline -->
  <line x1="312" y1="200" x2="376" y2="200" stroke="#111111" stroke-width="2"/>
  <!-- Screen stand -->
  <rect x="337" y="208" width="16" height="14" fill="#111111"/>
  <rect x="320" y="220" width="50" height="8" fill="#111111"/>
</svg>
