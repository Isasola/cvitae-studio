<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280" fill="none">
  <rect width="400" height="280" fill="#F5F0E8"/>
  <!-- Building body -->
  <rect x="120" y="100" width="160" height="140" fill="#F5F0E8" stroke="#111111" stroke-width="3"/>
  <!-- Building windows row 1 -->
  <rect x="135" y="115" width="30" height="25" fill="#111111"/>
  <rect x="175" y="115" width="30" height="25" fill="#111111"/>
  <rect x="235" y="115" width="30" height="25" fill="#111111"/>
  <!-- Building windows row 2 (gold) -->
  <rect x="135" y="155" width="30" height="25" fill="#C9A84C" stroke="#111111" stroke-width="2"/>
  <rect x="175" y="155" width="30" height="25" fill="#C9A84C" stroke="#111111" stroke-width="2"/>
  <rect x="235" y="155" width="30" height="25" fill="#C9A84C" stroke="#111111" stroke-width="2"/>
  <!-- Door -->
  <rect x="183" y="210" width="34" height="30" fill="#111111"/>
  <!-- Chimneys -->
  <rect x="140" y="68" width="18" height="34" fill="#111111"/>
  <rect x="175" y="55" width="18" height="47" fill="#111111"/>
  <rect x="245" y="72" width="18" height="30" fill="#111111"/>
  <!-- Smoke puffs (geometric) -->
  <rect x="142" y="56" width="14" height="10" fill="#C9A84C" stroke="#111111" stroke-width="2"/>
  <rect x="177" y="42" width="14" height="10" fill="#C9A84C" stroke="#111111" stroke-width="2"/>
  <rect x="247" y="60" width="14" height="10" fill="#C9A84C" stroke="#111111" stroke-width="2"/>
  <!-- Gold magnet on roof -->
  <rect x="175" y="75" width="50" height="24" fill="#C9A84C" stroke="#111111" stroke-width="3"/>
  <text x="180" y="92" font-family="Arial, sans-serif" font-size="11" font-weight="900" fill="#111111">MAGNET</text>
  <!-- Magnet arch -->
  <path d="M175 75 Q200 50 225 75" stroke="#111111" stroke-width="3" fill="none"/>
  <!-- Mouse cursors -->
  <polygon points="40,38 40,60 46,54 52,66 56,64 50,52 58,52" fill="#111111" transform="rotate(25,48,52)"/>
  <polygon points="338,28 338,50 344,44 350,56 354,54 348,42 356,42" fill="#111111" transform="rotate(-20,347,42)"/>
  <polygon points="28,138 28,160 34,154 40,166 44,164 38,152 46,152" fill="#111111" transform="rotate(10,36,152)"/>
  <!-- Dashed attraction lines -->
  <line x1="70" y1="50" x2="175" y2="84" stroke="#111111" stroke-width="2" stroke-dasharray="5,3"/>
  <line x1="328" y1="40" x2="225" y2="82" stroke="#111111" stroke-width="2" stroke-dasharray="5,3"/>
  <line x1="55" y1="148" x2="175" y2="92" stroke="#111111" stroke-width="2" stroke-dasharray="5,3"/>
  <!-- Bottom flow strip -->
  <rect x="0" y="244" width="400" height="36" fill="#111111"/>
  <text x="12" y="267" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#F5F0E8">Usuario aburrido  →  Tu web  →  Cliente con billetera abierta</text>
</svg>
