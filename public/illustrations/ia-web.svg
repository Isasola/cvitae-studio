<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280" fill="none">
  <rect width="400" height="280" fill="#F5F0E8"/>
  <!-- Old browser window -->
  <rect x="55" y="28" width="210" height="200" fill="#F5F0E8" stroke="#111111" stroke-width="3"/>
  <!-- Browser chrome top -->
  <rect x="55" y="28" width="210" height="28" fill="#111111"/>
  <!-- URL bar -->
  <rect x="65" y="34" width="130" height="16" fill="#F5F0E8" stroke="#111111" stroke-width="1"/>
  <!-- Window close dots -->
  <rect x="68" y="38" width="8" height="8" fill="#C9A84C"/>
  <rect x="80" y="38" width="8" height="8" fill="#C9A84C"/>
  <rect x="92" y="38" width="8" height="8" fill="#C9A84C"/>
  <!-- Exposed cables left -->
  <line x1="55" y1="80" x2="22" y2="80" stroke="#111111" stroke-width="3"/>
  <line x1="22" y1="80" x2="22" y2="115" stroke="#111111" stroke-width="3"/>
  <line x1="55" y1="115" x2="16" y2="115" stroke="#111111" stroke-width="3"/>
  <line x1="55" y1="160" x2="22" y2="160" stroke="#111111" stroke-width="3"/>
  <!-- Cable ends (exposed) -->
  <rect x="14" y="76" width="8" height="4" fill="#C9A84C"/>
  <rect x="8" y="111" width="8" height="4" fill="#C9A84C"/>
  <rect x="14" y="156" width="8" height="4" fill="#C9A84C"/>
  <!-- Exposed cables right -->
  <line x1="265" y1="90" x2="295" y2="90" stroke="#111111" stroke-width="3"/>
  <line x1="295" y1="90" x2="295" y2="130" stroke="#111111" stroke-width="3"/>
  <rect x="295" y="126" width="8" height="4" fill="#C9A84C"/>
  <!-- Connection port in center -->
  <rect x="120" y="100" width="90" height="62" fill="#111111" stroke="#111111" stroke-width="3"/>
  <rect x="128" y="108" width="74" height="46" fill="#F5F0E8"/>
  <!-- Port pins -->
  <rect x="138" y="122" width="6" height="18" fill="#111111"/>
  <rect x="150" y="122" width="6" height="18" fill="#111111"/>
  <rect x="162" y="122" width="6" height="18" fill="#111111"/>
  <rect x="174" y="122" width="6" height="18" fill="#111111"/>
  <!-- Floating AI block (right side) -->
  <rect x="285" y="65" width="95" height="88" fill="#C9A84C" stroke="#111111" stroke-width="3"/>
  <!-- Cybernetic eye -->
  <rect x="293" y="76" width="79" height="40" fill="#111111"/>
  <rect x="301" y="82" width="63" height="28" fill="#F5F0E8"/>
  <rect x="314" y="88" width="37" height="16" fill="#111111"/>
  <rect x="322" y="92" width="21" height="8" fill="#C9A84C"/>
  <!-- Pupil highlight -->
  <rect x="329" y="93" width="6" height="4" fill="#F5F0E8"/>
  <!-- AI gears -->
  <rect x="291" y="130" width="18" height="18" fill="#F5F0E8" stroke="#111111" stroke-width="2"/>
  <rect x="296" y="126" width="8" height="4" fill="#F5F0E8" stroke="#111111" stroke-width="1"/>
  <rect x="296" y="148" width="8" height="4" fill="#F5F0E8" stroke="#111111" stroke-width="1"/>
  <rect x="287" y="135" width="4" height="8" fill="#F5F0E8" stroke="#111111" stroke-width="1"/>
  <rect x="309" y="135" width="4" height="8" fill="#F5F0E8" stroke="#111111" stroke-width="1"/>
  <!-- Gear 2 -->
  <rect x="315" y="130" width="16" height="16" fill="#F5F0E8" stroke="#111111" stroke-width="2"/>
  <rect x="319" y="126" width="8" height="4" fill="#F5F0E8" stroke="#111111" stroke-width="1"/>
  <rect x="319" y="146" width="8" height="4" fill="#F5F0E8" stroke="#111111" stroke-width="1"/>
  <!-- Connection line from AI block to port -->
  <line x1="285" y1="112" x2="213" y2="132" stroke="#111111" stroke-width="3"/>
  <!-- Plug connector -->
  <rect x="207" y="127" width="22" height="14" fill="#C9A84C" stroke="#111111" stroke-width="2"/>
</svg>
