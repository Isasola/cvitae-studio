<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" fill="#F5F0E8"/>

  <!-- Browser window shadow -->
  <rect x="34" y="34" width="220" height="190" fill="#111111"/>
  <!-- Browser window -->
  <rect x="28" y="28" width="220" height="190" fill="#F5F0E8" stroke="#111111" stroke-width="3"/>
  <!-- Browser chrome bar -->
  <rect x="28" y="28" width="220" height="32" fill="#111111"/>
  <!-- Traffic lights (square neo-brut style) -->
  <rect x="40" y="37" width="12" height="12" fill="#C9A84C"/>
  <rect x="58" y="37" width="12" height="12" fill="#C9A84C"/>
  <rect x="76" y="37" width="12" height="12" fill="#C9A84C"/>
  <!-- URL bar -->
  <rect x="96" y="35" width="130" height="18" fill="#F5F0E8" stroke="#C9A84C" stroke-width="1.5"/>
  <path d="M102 44 L218 44" stroke="#111111" stroke-width="1" opacity="0.3"/>

  <!-- Old page content lines (rough/broken look) -->
  <rect x="44" y="76" width="120" height="8" fill="#111111" opacity="0.15"/>
  <rect x="44" y="90" width="88" height="8" fill="#111111" opacity="0.1"/>
  <rect x="44" y="104" width="100" height="8" fill="#111111" opacity="0.12"/>
  <rect x="44" y="118" width="64" height="8" fill="#111111" opacity="0.08"/>

  <!-- Exposed wires left side -->
  <path d="M28 100 L10 100 L10 132" stroke="#111111" stroke-width="3" stroke-linecap="square"/>
  <path d="M28 140 L6 140 L6 160" stroke="#111111" stroke-width="3" stroke-linecap="square"/>
  <!-- Wire ends (stripped copper) -->
  <rect x="2" y="128" width="10" height="6" fill="#C9A84C" stroke="#111111" stroke-width="1.5"/>
  <rect x="2" y="156" width="10" height="6" fill="#C9A84C" stroke="#111111" stroke-width="1.5"/>

  <!-- Exposed wires right side -->
  <path d="M248 88 L268 88 L268 118" stroke="#111111" stroke-width="3" stroke-linecap="square"/>
  <path d="M248 150 L264 150" stroke="#111111" stroke-width="3" stroke-linecap="square"/>
  <!-- Wire ends -->
  <rect x="264" y="114" width="10" height="6" fill="#C9A84C" stroke="#111111" stroke-width="1.5"/>
  <rect x="260" y="146" width="10" height="6" fill="#C9A84C" stroke="#111111" stroke-width="1.5"/>

  <!-- USB/Port connector in page center shadow -->
  <rect x="108" y="140" width="80" height="52" fill="#111111" transform="translate(3,3)"/>
  <!-- Port body -->
  <rect x="108" y="140" width="80" height="52" fill="#111111" stroke="#111111" stroke-width="2"/>
  <rect x="116" y="148" width="64" height="36" fill="#F5F0E8"/>
  <!-- Port pins -->
  <rect x="124" y="158" width="6" height="16" fill="#111111"/>
  <rect x="136" y="158" width="6" height="16" fill="#111111"/>
  <rect x="148" y="158" width="6" height="16" fill="#111111"/>
  <rect x="160" y="158" width="6" height="16" fill="#111111"/>

  <!-- AI Block (floating, right side) shadow -->
  <rect x="294" y="72" width="88" height="96" fill="#111111" transform="translate(4,4)"/>
  <!-- AI Block body -->
  <rect x="294" y="72" width="88" height="96" fill="#C9A84C" stroke="#111111" stroke-width="3"/>

  <!-- Cybernetic eye housing -->
  <rect x="302" y="82" width="72" height="44" fill="#111111"/>
  <rect x="308" y="88" width="60" height="32" fill="#1a1a1a"/>
  <!-- Iris / pupil -->
  <ellipse cx="338" cy="104" rx="16" ry="12" fill="#F5F0E8"/>
  <ellipse cx="338" cy="104" rx="8" ry="8" fill="#111111"/>
  <ellipse cx="338" cy="104" rx="3" ry="3" fill="#C9A84C"/>
  <!-- Eye reflection dot -->
  <circle cx="343" cy="100" r="2" fill="#F5F0E8"/>
  <!-- Eyelid lines -->
  <path d="M310 104 C322 96 354 96 366 104" stroke="#C9A84C" stroke-width="1.5" fill="none"/>
  <path d="M310 104 C322 112 354 112 366 104" stroke="#C9A84C" stroke-width="1.5" fill="none"/>

  <!-- Gear below eye -->
  <g transform="translate(308,136)">
    <circle cx="10" cy="10" r="7" fill="#F5F0E8" stroke="#111111" stroke-width="2"/>
    <circle cx="10" cy="10" r="3" fill="#111111"/>
    <rect x="8" y="1" width="4" height="5" fill="#F5F0E8" stroke="#111111" stroke-width="1"/>
    <rect x="8" y="14" width="4" height="5" fill="#F5F0E8" stroke="#111111" stroke-width="1"/>
    <rect x="1" y="8" width="5" height="4" fill="#F5F0E8" stroke="#111111" stroke-width="1"/>
    <rect x="14" y="8" width="5" height="4" fill="#F5F0E8" stroke="#111111" stroke-width="1"/>
  </g>
  <g transform="translate(328,134)">
    <circle cx="10" cy="10" r="7" fill="#F5F0E8" stroke="#111111" stroke-width="2"/>
    <circle cx="10" cy="10" r="3" fill="#111111"/>
    <rect x="8" y="1" width="4" height="5" fill="#F5F0E8" stroke="#111111" stroke-width="1"/>
    <rect x="8" y="14" width="4" height="5" fill="#F5F0E8" stroke="#111111" stroke-width="1"/>
    <rect x="1" y="8" width="5" height="4" fill="#F5F0E8" stroke="#111111" stroke-width="1"/>
    <rect x="14" y="8" width="5" height="4" fill="#F5F0E8" stroke="#111111" stroke-width="1"/>
  </g>

  <!-- Connection cable from AI block to port -->
  <path d="M294 116 C270 116 250 160 188 162" stroke="#111111" stroke-width="4" stroke-linecap="square" fill="none"/>
  <!-- Cable plug -->
  <rect x="182" y="156" width="18" height="12" fill="#C9A84C" stroke="#111111" stroke-width="2"/>
  <!-- Cable braid texture -->
  <path d="M294 116 C280 110 274 122 260 116 C246 110 240 122 226 116 C212 110 206 122 192 116" stroke="#111111" stroke-width="1" fill="none" opacity="0.4"/>

  <!-- Label bottom -->
  <rect x="0" y="262" width="400" height="38" fill="#111111"/>
  <rect x="12" y="272" width="176" height="18" fill="#C9A84C"/>
  <text x="16" y="285" font-family="'Space Grotesk',Arial,sans-serif" font-size="11" font-weight="700" fill="#111111">Gemini · Claude · AWS Bedrock</text>
  <text x="198" y="285" font-family="'Space Grotesk',Arial,sans-serif" font-size="11" font-weight="600" fill="#F5F0E8">24/7 · sin intervención humana</text>
</svg>
