<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <!-- Background -->
  <rect width="1200" height="630" fill="#F5F0E8"/>
  <!-- Outer border frame -->
  <rect x="20" y="20" width="1160" height="590" fill="none" stroke="#111111" stroke-width="6"/>
  <!-- Gold accent bar left -->
  <rect x="20" y="20" width="12" height="590" fill="#C9A84C"/>
  <!-- Top decorative stripe -->
  <rect x="32" y="20" width="1148" height="12" fill="#111111"/>
  <!-- Bottom decorative stripe -->
  <rect x="32" y="598" width="1148" height="12" fill="#111111"/>
  <!-- Main headline -->
  <text x="80" y="250" font-family="'Bebas Neue', Impact, sans-serif" font-size="150" fill="#111111" letter-spacing="-2">CVITAE STUDIO</text>
  <!-- Subline -->
  <text x="82" y="320" font-family="'Space Grotesk', Arial, sans-serif" font-size="32" fill="#111111" letter-spacing="1">Components · Wrappers · Digital Services</text>
  <!-- Divider line -->
  <rect x="82" y="345" width="480" height="4" fill="#C9A84C"/>
  <!-- Bottom tag -->
  <rect x="80" y="470" width="300" height="56" fill="#C9A84C"/>
  <rect x="80" y="470" width="300" height="56" fill="none" stroke="#111111" stroke-width="4"/>
  <text x="100" y="507" font-family="'Space Grotesk', Arial, sans-serif" font-size="24" font-weight="700" fill="#111111">studio.cvitae.lat</text>
  <!-- Decorative corner marks bottom-right -->
  <rect x="1100" y="570" width="60" height="6" fill="#111111"/>
  <rect x="1154" y="516" width="6" height="60" fill="#111111"/>
  <!-- Decorative grid dots -->
  <rect x="900" y="140" width="6" height="6" fill="#C9A84C"/>
  <rect x="920" y="140" width="6" height="6" fill="#C9A84C"/>
  <rect x="940" y="140" width="6" height="6" fill="#C9A84C"/>
  <rect x="900" y="160" width="6" height="6" fill="#C9A84C"/>
  <rect x="920" y="160" width="6" height="6" fill="#111111"/>
  <rect x="940" y="160" width="6" height="6" fill="#C9A84C"/>
  <rect x="900" y="180" width="6" height="6" fill="#C9A84C"/>
  <rect x="920" y="180" width="6" height="6" fill="#C9A84C"/>
  <rect x="940" y="180" width="6" height="6" fill="#C9A84C"/>
